<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteVinhKhanh Admin — Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-page">
        <div class="login-card">
            <h1>🍜 TasteVinhKhanh</h1>
            <p>Hệ thống quản trị nội dung</p>

            <div id="alertBox" class="alert alert-error" style="display:none"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control"
                       value="admin@vinhkhanh.com" placeholder="admin@vinhkhanh.com">
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control"
                       placeholder="••••••••">
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center; padding:10px"
                    onclick="doLogin()" id="loginBtn">
                Đăng nhập
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
    // Nếu đã đăng nhập rồi thì redirect thẳng vào dashboard
    if (isLoggedIn()) window.location.href = 'dashboard.html';

    // Cho phép nhấn Enter để đăng nhập
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('loginBtn');

        if (!email || !password) {
            alertBox.textContent = 'Vui lòng nhập email và mật khẩu.';
            alertBox.style.display = 'block';
            return;
        }

        btn.textContent = 'Đang đăng nhập...';
        btn.disabled = true;
        alertBox.style.display = 'none';

        try {
            const ok = await login(email, password);
            if (ok) {
                window.location.href = 'dashboard.html';
            } else {
                alertBox.textContent = 'Email hoặc mật khẩu không đúng.';
                alertBox.style.display = 'block';
            }
        } catch (e) {
            alertBox.textContent = 'Không thể kết nối server. Kiểm tra lại API_BASE trong api.js.';
            alertBox.style.display = 'block';
        }

        btn.textContent = 'Đăng nhập';
        btn.disabled = false;
    }
    </script>

</body>
</html>
